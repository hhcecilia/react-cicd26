version: '3.8'

services:
  jenkins:
    build:
      context: ./cicd
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: on-failure
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
